<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>911[POLICE MOD] | تفعيل الشرطة</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Tahoma, Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: rgba(0, 0, 0, 0.6);
      border-radius: 15px;
      padding: 30px;
      width: 350px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    .card img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      margin-bottom: 15px;
      border: 3px solid #3498db;
    }

    h1 {
      margin: 10px 0;
      font-size: 22px;
      color: #00c3ff;
    }

    p {
      font-size: 14px;
      color: #ddd;
      margin-bottom: 25px;
    }

    a.login-btn {
      display: inline-block;
      background: #5865F2;
      color: #fff;
      text-decoration: none;
      padding: 12px 25px;
      border-radius: 30px;
      font-size: 15px;
      transition: 0.3s;
    }

    a.login-btn:hover {
      background: #4752c4;
      transform: scale(1.05);
    }

    footer {
      margin-top: 20px;
      font-size: 11px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="https://cdn.discordapp.com/attachments/1451749051283537930/1451751023516319805/512_1.gif" alt="Server Logo">
    <h1>911[POLICE MOD]</h1>
    <p>
      نظام التفعيل الآلي لأعضاء الشرطة  
      <br>
      يرجى تسجيل الدخول بالدسكورد و اجتياز الاختبار
    </p>

    <a class="login-btn" href="/login">
      🔐 تسجيل الدخول عبر Discord
    </a>

    <footer>
      © 911[POLICE MOD] – FiveM RP
    </footer>
  </div>

</body>
</html>
